# Observatory iOS — xcodegen spec.
#
# The iOS app is a SwiftUI shell wrapping a WKWebView that loads the web bundle.
# This preserves byte-identical visual behaviour with the web client — the
# Three.js renderer is the single source of truth (spec §4.1).
#
# Pre-build script:
#   1. Builds the web app into web/dist (vite build).
#   2. Copies web/dist/ into the iOS app bundle as a resource folder.
#
# Run `xcodegen generate` from this directory to produce Observatory.xcodeproj.

name: Observatory
options:
  bundleIdPrefix: dev.openclaw
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"          # iPhone (1) + iPad (2) — Universal
    DEVELOPMENT_LANGUAGE: en
    ENABLE_PREVIEWS: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    GENERATE_INFOPLIST_FILE: NO

targets:
  Observatory:
    type: application
    platform: iOS
    sources:
      - path: Observatory
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Observatory/WebBundle
        optional: true                      # Generated by pre-build script
        type: folder
    info:
      path: Observatory/Info.plist
      properties:
        CFBundleDisplayName: Observatory
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        UIStatusBarHidden: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UIUserInterfaceStyle: Dark
        ITSAppUsesNonExemptEncryption: false
        # Network for connecting to LAN/local OpenClaw gateways (no global insecure block needed in v1)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: "Observatory connects to your local OpenClaw gateway and other agent endpoints on your network."
        NSBonjourServices:
          - _http._tcp
          - _ws._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.openclaw.observatory
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""                # Fill via Xcode signing UI before submission
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Observatory."
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        ENABLE_BITCODE: NO
    preBuildScripts:
      - name: "Bundle web app"
        basedOnDependencyAnalysis: false
        runOnlyWhenInstalling: false
        shell: /bin/bash
        script: |
          set -euo pipefail
          REPO_ROOT="${SRCROOT}/.."
          WEB_DIR="${REPO_ROOT}/web"
          BUNDLE_DEST="${SRCROOT}/Observatory/WebBundle"
          if [[ ! -d "${WEB_DIR}" ]]; then
            echo "warning: web/ not found at ${WEB_DIR}"
            exit 0
          fi
          echo "→ Building web bundle from ${WEB_DIR}"
          cd "${WEB_DIR}"
          if [[ ! -d node_modules ]]; then
            npm install --no-audit --no-fund
          fi
          npm run build
          rm -rf "${BUNDLE_DEST}"
          mkdir -p "${BUNDLE_DEST}"
          cp -R "${WEB_DIR}/dist/." "${BUNDLE_DEST}/"
          echo "→ Web bundle copied to ${BUNDLE_DEST}"
